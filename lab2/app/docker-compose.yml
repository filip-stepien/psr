services:
    mongodb:
        image: mongo:8.0
        container_name: psr-mongodb
        ports:
            - '27017:27017'
        environment:
            MONGO_INITDB_DATABASE: psr

    mongo-express:
        image: mongo-express:1.0.2
        container_name: psr-mongo-express
        depends_on:
            - mongodb
        ports:
            - '8081:8081'
        environment:
            ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017
            ME_CONFIG_BASICAUTH: false
